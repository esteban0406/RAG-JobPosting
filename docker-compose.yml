services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: job-posting-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobpostings
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  embedding-server:
    build: ./embedding-server
    container_name: job-posting-embeddings
    ports:
      - '8000:8000'
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/docs || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  huggingface_cache:
