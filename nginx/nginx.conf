# Copy this file to /etc/nginx/sites-available/esteban-jobai.duckdns.org
# Then: sudo ln -s /etc/nginx/sites-available/esteban-jobai.duckdns.org /etc/nginx/sites-enabled/
# Run Certbot: sudo certbot --nginx -d esteban-jobai.duckdns.org
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    server_name esteban-jobai.duckdns.org;

    # NestJS Backend (Docker container on host port 4002)
    location /api/ {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Next.js Frontend (Docker container on host port 3002)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
}
